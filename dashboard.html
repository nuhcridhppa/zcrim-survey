<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZCRIM Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--bdr:#334155;--acc:#3b82f6;--grn:#22c55e;--org:#f59e0b;--red:#ef4444;--txt:#f1f5f9;--mut:#94a3b8}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;font-size:14px}
/* TOPBAR */
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;gap:10px;flex-wrap:wrap}
.topbar h1{font-size:17px;font-weight:800;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.updated{font-size:11px;color:var(--mut)}
.btn{padding:8px 14px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
.btn-blue{background:var(--acc);color:#fff}
.btn-green{background:var(--grn);color:#fff}
.btn-gray{background:#475569;color:#fff}
/* CONTAINER */
.container{max-width:1300px;margin:0 auto;padding:20px}
/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center}
.kpi .num{font-size:38px;font-weight:800;line-height:1.1;margin-bottom:4px}
.kpi .lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.kpi .sub{font-size:11px;margin-top:4px;color:var(--mut)}
/* PROGRESS BAR */
.prog-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:20px}
.prog-card h3{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.prog-track{background:#334155;border-radius:8px;height:22px;overflow:hidden;margin-bottom:6px;position:relative}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#3b82f6,#22c55e);transition:width 1s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:12px;font-weight:700;color:#fff}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--mut)}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:20px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px}
.panel h3{font-size:12px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
/* LEADERBOARD */
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #334155}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:700;font-size:13px}
.lb-block{font-size:10px;color:var(--mut)}
.lb-last{font-size:10px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-bar-wrap{height:4px;background:#334155;border-radius:2px;margin-top:4px}
.lb-bar{height:100%;border-radius:2px}
.lb-nums{text-align:right;font-size:11px;flex-shrink:0}
.lb-pct{font-weight:800;font-size:14px;margin-bottom:2px}
/* SESSIONS */
.sess-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #334155}
.sess-row:last-child{border-bottom:none}
.sess-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sess-dot.active{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.sess-dot.expired{background:#475569}
.sess-info{flex:1}
.sess-name{font-weight:600;font-size:13px}
.sess-time{font-size:10px;color:var(--mut)}
.sess-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.sess-badge.active{background:#22c55e22;color:var(--grn);border:1px solid #22c55e44}
.sess-badge.expired{background:#47556922;color:#94a3b8;border:1px solid #475569}
/* BLOCK TABLE */
.block-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #334155}
.block-row:last-child{border-bottom:none}
.block-name{font-weight:600;font-size:12px;width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.block-bar-wrap{flex:1;height:8px;background:#334155;border-radius:4px;overflow:hidden}
.block-bar{height:100%;border-radius:4px;transition:width .6s}
.block-stats{font-size:10px;color:var(--mut);width:80px;text-align:right;flex-shrink:0}
/* WARD TABLE */
.ward-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #334155}
.ward-row:last-child{border-bottom:none}
.ward-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ward-bar-wrap{width:80px;height:6px;background:#334155;border-radius:3px;flex-shrink:0}
.ward-bar{height:100%;border-radius:3px}
.ward-pct{width:30px;text-align:right;font-size:11px;color:var(--mut);flex-shrink:0}
.ward-nums{font-size:10px;color:var(--mut);width:44px;text-align:right;flex-shrink:0}
/* SEARCH */
.search-box{width:100%;background:#0f172a;border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:13px;outline:none;margin-bottom:12px}
/* STATUS COLORS */
.red-row   .lb-pct{color:var(--red)}
.org-row   .lb-pct{color:var(--org)}
.grn-row   .lb-pct{color:var(--grn)}
/* LOGIN */

.err-msg{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}
/* SPINNER */
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--mut)}
.empty{text-align:center;padding:20px;color:var(--mut);font-size:13px}
</style>
</head>
<body>

<div id="dashboard-screen">
  <div class="topbar">
    <h1>🏛️ ZCRIM Dashboard · Mewat/Nuh</h1>
    <div class="topbar-right">
      <span class="updated" id="updated-time"></span>
      <select id="block-filter" onchange="applyBlockFilter()" style="background:#1e293b;border:1px solid #334155;color:#f1f5f9;padding:7px 10px;border-radius:8px;font-size:13px;cursor:pointer">
        <option value="">🗺️ All Blocks</option>
        <option>NAGINA BL</option>
        <option>TAORU MC</option>
        <option>NUH BL</option>
        <option>INDRI BL</option>
        <option>PINGWAN BL</option>
        <option>FEROZEPUR JHIRKA BL</option>
        <option>FEROZEPUR JHIRKA MC</option>
        <option>TAORU BL</option>
        <option>PUNAHANA MC</option>
        <option>NUH MC</option>
        <option>PUNAHANA BL</option>
      </select>
      <button class="btn btn-green" onclick="exportCSV()">📥 Export CSV</button>
      <button class="btn btn-blue" onclick="loadData()">🔄 Refresh</button>
    </div>
  </div>
  <div class="container" id="dashboard-body">
    <div class="loading-screen"><span class="spinner"></span><span>Loading…</span></div>
  </div>
</div>

<script>
var SESSION_TOKEN   = '';
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-9SSHrwMgKfHw-1qEFqH-cmKDjNjNLbGOu5DN9yD9YMp-iTESK4TkdWl5kDCax-uT3w/exec';

function callAPI(fn, args, cb) {
  var url = APPS_SCRIPT_URL + '?fn=' + encodeURIComponent(fn) + '&args=' + encodeURIComponent(JSON.stringify(args||[]));
  var xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    try { cb(null, JSON.parse(xhr.responseText)); }
    catch(e) { cb('Parse error'); }
  };
  xhr.onerror = function(){ cb('Network error'); };
  xhr.open('GET', url, true);
  xhr.send();
}

function showError(msg) {
  document.getElementById('dashboard-body').innerHTML =
    '<div class="loading-screen" style="color:var(--red)">❌ '+msg+'</div>';
}

function loadData() {
  document.getElementById('updated-time').textContent = 'Refreshing…';
  callAPI('getLeaderboard', [SESSION_TOKEN], function(err, res) {
    if (err || !res || !res.ok) { showError(err||(res&&res.msg)||'Failed'); return; }
    dashData = res;
    renderDashboard(res);
  });
}

function renderDashboard(d) {
  document.getElementById('updated-time').textContent = 'Updated: ' + (d.updated||new Date().toLocaleString());
  var total=0, done=0, absent=0;
  d.board.forEach(function(z){ total+=z.total; done+=z.done; absent+=z.absent; });
  var pending = total - done - absent;
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var medals = ['🥇','🥈','🥉'];

  // KPI cards
  var kpiHtml =
    '<div class="kpi-grid">'+
      kpi(total,  'Total Families', '#3b82f6', '')+
      kpi(done,   'Completed',      '#22c55e', pct+'% done')+
      kpi(pending,'Pending',        '#f59e0b', '')+
      kpi(absent, 'Absent/Skipped', '#ef4444', '')+
      kpi((d.activeSessions||[]).length, 'Online Now', '#a78bfa', 'ZCRIMs active')+
    '</div>';

  // Progress bar
  var progHtml =
    '<div class="prog-card">'+
      '<h3>Overall Survey Progress</h3>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%">'+pct+'%</div></div>'+
      '<div class="prog-labels"><span>'+done+' families verified</span><span>'+pending+' remaining</span><span>'+total+' total</span></div>'+
    '</div>';

  // Leaderboard
  var lbHtml = d.board.map(function(z,i){
    var col    = z.pct>=75?'#22c55e':z.pct>=40?'#f59e0b':'#ef4444';
    var rowCls = z.pct>=75?'grn-row':z.pct>=40?'org-row':'red-row';
    var last   = z.lastActive && z.lastActive!=='Never' ? '🕐 Last active: '+z.lastActive : '⚠️ No activity yet';
    return '<div class="lb-row '+rowCls+'">'+
      '<div class="lb-rank">'+(medals[i]||'#'+(i+1))+'</div>'+
      '<div class="lb-info">'+
        '<div class="lb-name">'+z.name+'</div>'+
        '<div class="lb-block">'+z.block+'</div>'+
        '<div class="lb-last">'+last+'</div>'+
        '<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+z.pct+'%;background:'+col+'"></div></div>'+
      '</div>'+
      '<div class="lb-nums">'+
        '<div class="lb-pct" style="color:'+col+'">'+z.pct+'%</div>'+
        '<div style="color:var(--grn)">✅ '+z.done+'</div>'+
        '<div style="color:var(--org)">⏳ '+z.pending+'</div>'+
        '<div style="color:var(--red)">🚫 '+z.absent+'</div>'+
      '</div>'+
    '</div>';
  }).join('');

  // Sessions panel
  var active  = d.activeSessions  || [];
  var expired = d.expiredSessions || [];
  var sessHtml = '';
  if(active.length===0 && expired.length===0){
    sessHtml = '<div class="empty">No session data yet</div>';
  } else {
    active.forEach(function(s){
      sessHtml += '<div class="sess-row">'+
        '<div class="sess-dot active"></div>'+
        '<div class="sess-info"><div class="sess-name">'+s.name+'</div>'+
        '<div class="sess-time">Logged in: '+s.loginAt+'</div></div>'+
        '<span class="sess-badge active">ONLINE</span></div>';
    });
    expired.slice(0,8).forEach(function(s){
      sessHtml += '<div class="sess-row">'+
        '<div class="sess-dot expired"></div>'+
        '<div class="sess-info"><div class="sess-name">'+s.name+'</div>'+
        '<div class="sess-time">Last seen: '+(s.lastSeen||'—')+'</div></div>'+
        '<span class="sess-badge expired">OFFLINE</span></div>';
    });
  }

  // Block-wise summary
  var blockHtml = (d.blocks||[]).map(function(b){
    var p = b.total>0 ? Math.round(b.done/b.total*100) : 0;
    var col = p>=75?'#22c55e':p>=40?'#f59e0b':'#ef4444';
    return '<div class="block-row">'+
      '<div class="block-name">'+b.block+'</div>'+
      '<div class="block-bar-wrap"><div class="block-bar" style="width:'+p+'%;background:'+col+'"></div></div>'+
      '<div class="block-stats">'+b.done+'/'+b.total+' ('+p+'%)</div>'+
    '</div>';
  }).join('') || '<div class="empty">No data</div>';

  // Ward table with search
  var wardRows = (d.wards||[]).map(function(w){
    var p = w.total>0 ? Math.round(w.done/w.total*100) : 0;
    var col = p===100?'#22c55e':p>=50?'#3b82f6':'#f59e0b';
    var cls = p===100?'grn':p>=50?'acc':'org';
    return '<div class="ward-row" data-ward="'+w.ward.toLowerCase()+'">'+
      '<div class="ward-name">'+w.ward+'<div style="font-size:10px;color:var(--mut)">'+w.block+'</div></div>'+
      '<div class="ward-bar-wrap"><div class="ward-bar" style="width:'+p+'%;background:'+col+'"></div></div>'+
      '<div class="ward-pct">'+p+'%</div>'+
      '<div class="ward-nums">'+w.done+'/'+w.total+'</div>'+
      '<div style="font-size:10px;width:32px;text-align:right;color:#ef4444">🚫'+w.absent+'</div>'+
    '</div>';
  }).join('') || '<div class="empty">No village data</div>';

  document.getElementById('dashboard-body').innerHTML =
    kpiHtml + progHtml +
    '<div class="grid2">'+
      '<div class="panel"><h3>📊 Completion by ZCRIM <span style="font-size:10px;font-weight:400">Stacked</span></h3><div style="position:relative;height:260px"><canvas id="chart-bar"></canvas></div></div>'+
      '<div class="panel"><h3>📈 Daily Trend <span style="font-size:10px;font-weight:400">Last 14 days</span></h3><div style="position:relative;height:260px"><canvas id="chart-trend"></canvas></div></div>'+
    '</div>'+
    '<div class="grid3">'+
      '<div class="panel" style="grid-column:span 1"><h3>🏆 ZCRIM Leaderboard</h3>'+lbHtml+'</div>'+
      '<div class="panel" style="grid-column:span 1"><h3>🟢 Login Status <span>'+active.length+' online</span></h3>'+sessHtml+'</div>'+
      '<div class="panel" style="grid-column:span 1"><h3>🗂️ Block Summary</h3>'+blockHtml+'</div>'+
    '</div>'+
    '<div class="panel" style="margin-bottom:24px">'+
      '<h3>🏘️ Village / Ward Breakdown <span style="font-weight:400;font-size:11px">'+(d.wards||[]).length+' villages</span></h3>'+
      '<input class="search-box" id="ward-search" placeholder="🔍 Search village..." oninput="filterWards(this.value)"/>'+
      '<div id="ward-list">'+wardRows+'</div>'+
    '</div>';

  setTimeout(function(){ renderCharts(d); }, 100);
}

function kpi(num, label, color, sub) {
  return '<div class="kpi"><div class="num" style="color:'+color+'">'+num+'</div><div class="lbl">'+label+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
}

function filterWards(q) {
  var rows = document.querySelectorAll('#ward-list .ward-row');
  rows.forEach(function(r){
    r.style.display = r.getAttribute('data-ward').indexOf(q.toLowerCase()) > -1 ? '' : 'none';
  });
}

function renderCharts(d) {
  Object.keys(charts).forEach(function(k){ if(charts[k]){ charts[k].destroy(); charts[k]=null; } });
  var barEl = document.getElementById('chart-bar');
  var trendEl = document.getElementById('chart-trend');
  if(!barEl || !trendEl) return;

  charts.bar = new Chart(barEl.getContext('2d'), {
    type:'bar',
    data:{
      labels: d.board.map(function(z){ return z.name.split(' ')[0]; }),
      datasets:[
        {label:'Done',    data:d.board.map(function(z){return z.done;}),    backgroundColor:'#22c55e'},
        {label:'Absent',  data:d.board.map(function(z){return z.absent;}),  backgroundColor:'#f59e0b'},
        {label:'Pending', data:d.board.map(function(z){return z.pending;}), backgroundColor:'#334155'}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{
        x:{stacked:true,ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#1e293b'}},
        y:{stacked:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}}
      }
    }
  });

  charts.trend = new Chart(trendEl.getContext('2d'), {
    type:'line',
    data:{
      labels:(d.trend||[]).map(function(t){return t.date;}),
      datasets:[{
        label:'Surveys',
        data:(d.trend||[]).map(function(t){return t.count;}),
        borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.15)',
        fill:true,tension:0.4,pointBackgroundColor:'#3b82f6',pointRadius:4
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8'},grid:{color:'#334155'},beginAtZero:true}
      }
    }
  });
}

// Block Filter
function applyBlockFilter() {
  var block = document.getElementById('block-filter').value.toUpperCase();
  if (!dashData) return;
  var filtered = JSON.parse(JSON.stringify(dashData)); // deep copy
  if (block) {
    filtered.board   = filtered.board.filter(function(z){ return z.block.toUpperCase()===block; });
    filtered.wards   = (filtered.wards||[]).filter(function(w){ return w.block.toUpperCase()===block; });
    filtered.blocks  = (filtered.blocks||[]).filter(function(b){ return b.block.toUpperCase()===block; });
    filtered.activeSessions  = (filtered.activeSessions||[]).filter(function(s){
      var z = (dashData.board||[]).filter(function(z){ return z.name===s.name; })[0];
      return z && z.block.toUpperCase()===block;
    });
  }
  renderDashboard(filtered);
}

// Auto-init on load
(function init(){ callAPI('loginZcrim', ['9466610668', 'ZCRIM@2024'], function(err, res) {
  if(err||!res.ok) return;
  SESSION_TOKEN = res.token;
  loadData();
}); })();

// Export CSV
function exportCSV() {
  if (!dashData || !dashData.board) { alert('Load dashboard first'); return; }
  var rows = [['Name','Block','Total','Done','Absent','Pending','%','Last Active']];
  dashData.board.forEach(function(z){
    rows.push([z.name,z.block,z.total,z.done,z.absent,z.pending,z.pct+'%',z.lastActive]);
  });
  // Add block summary
  rows.push([]);
  rows.push(['Block Summary','','Total','Done','Absent','Pending','%']);
  (dashData.blocks||[]).forEach(function(b){
    var p = b.total>0?Math.round(b.done/b.total*100):0;
    rows.push([b.block,'',b.total,b.done,b.absent,b.total-b.done-b.absent,p+'%']);
  });
  var csv = rows.map(function(r){ return r.join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ZCRIM_Progress_'+new Date().toLocaleDateString().replace(/\//g,'-')+'.csv';
  a.click();
}

// Auto-refresh every 60 seconds
setInterval(function(){ if(SESSION_TOKEN) loadData(); }, 60000);
</script>
</body>
</html>
