<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZCRIM Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--bdr:#334155;--acc:#3b82f6;--grn:#22c55e;--org:#f59e0b;--red:#ef4444;--txt:#f1f5f9;--mut:#94a3b8}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;font-size:14px;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar h1{font-size:18px;font-weight:800}
.btn-refresh{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:13px}
.container{max-width:1200px;margin:0 auto;padding:20px}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
@media(max-width:700px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
.sum-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;text-align:center}
.sum-card .num{font-size:36px;font-weight:800;margin-bottom:4px}
.sum-card .lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.overall-bar{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:24px}
.overall-bar h3{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.prog-track{background:#334155;border-radius:8px;height:20px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#3b82f6,#22c55e);transition:width .8s ease}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--mut)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:800px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px}
.panel h3{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #334155}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:20px;width:32px;text-align:center}
.lb-info{flex:1}
.lb-name{font-weight:700;font-size:13px}
.lb-block{font-size:11px;color:var(--mut)}
.lb-bar-wrap{height:4px;background:#334155;border-radius:2px;margin-top:4px}
.lb-bar{height:100%;border-radius:2px;transition:width .6s}
.lb-nums{text-align:right;font-size:12px}
.lb-pct{font-weight:800;font-size:15px}
.act-row{padding:10px 0;border-bottom:1px solid #334155;display:flex;gap:10px;align-items:flex-start}
.act-row:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);margin-top:4px;flex-shrink:0}
.act-info{flex:1}
.act-name{font-weight:600;font-size:13px}
.act-meta{font-size:11px;color:var(--mut)}
.ward-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #334155}
.ward-row:last-child{border-bottom:none}
.ward-name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ward-bar-wrap{width:100px;height:6px;background:#334155;border-radius:3px}
.ward-bar{height:100%;border-radius:3px;background:var(--acc)}
.ward-pct{width:36px;text-align:right;font-size:12px;color:var(--mut)}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:32px;width:100%;max-width:360px;text-align:center}
.login-card h2{font-size:22px;font-weight:800;margin-bottom:6px}
.login-card p{color:var(--mut);font-size:13px;margin-bottom:24px}
.login-card input{width:100%;background:#0f172a;border:1px solid var(--bdr);border-radius:8px;padding:12px;color:var(--txt);font-size:15px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px}
.login-card button{width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.err-msg{color:var(--red);font-size:13px;margin-top:10px;min-height:20px}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--mut)}
.updated{font-size:11px;color:var(--mut);margin-right:8px}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <div style="font-size:52px;margin-bottom:12px">🏛️</div>
      <h2>ZCRIM Admin</h2>
      <p>Survey Dashboard · Mewat/Nuh District</p>
      <input type="password" id="admin-key" placeholder="Enter admin key" autocomplete="off" />
      <button onclick="doLogin()">Access Dashboard →</button>
      <div class="err-msg" id="login-err"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboard-screen" style="display:none">
  <div class="topbar">
    <h1>🏛️ ZCRIM Dashboard</h1>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="updated" id="updated-time"></span>
      <button class="btn-refresh" onclick="loadData()">🔄 Refresh</button>
    </div>
  </div>
  <div class="container" id="dashboard-body">
    <div class="loading-screen"><span class="spinner"></span><span>Loading…</span></div>
  </div>
</div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkZsidK_1Tz4SblxZBODnTOXt1YlY_9LbK0UfiDac1oyxeT1wegvlsCubhjbAHuWs89Q/exec';
var SESSION_TOKEN = '';
var charts = {};

// Admin password check is done locally — then login as master ANEES
var ADMIN_PASS = 'ZCRIM_ADMIN';

function doLogin() {
  var key = document.getElementById('admin-key').value.trim();
  if (!key) { document.getElementById('login-err').textContent = 'Please enter the admin key'; return; }
  if (key !== ADMIN_PASS) {
    document.getElementById('login-err').textContent = 'Wrong admin key. Try again.';
    document.getElementById('admin-key').value = '';
    return;
  }
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'block';
  // Login as master ANEES to get session token
  callAPI('loginZcrim', ['9466610668', 'ZCRIM@2024'], function(err, res) {
    if (err || !res || !res.ok) {
      document.getElementById('dashboard-body').innerHTML =
        '<div class="loading-screen" style="color:var(--red)">❌ Could not connect to server.<br><small style="color:var(--mut)">Check internet or redeploy Apps Script</small></div>';
      return;
    }
    SESSION_TOKEN = res.token;
    loadData();
  });
}

document.getElementById('admin-key').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doLogin();
});

function callAPI(fn, args, cb) {
  var url = APPS_SCRIPT_URL + '?fn=' + encodeURIComponent(fn) + '&args=' + encodeURIComponent(JSON.stringify(args || []));
  var xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    try { cb(null, JSON.parse(xhr.responseText)); }
    catch(e) { cb('Parse error: ' + xhr.responseText.substring(0, 100)); }
  };
  xhr.onerror = function() { cb('Network error'); };
  xhr.open('GET', url, true);
  xhr.send();
}

function loadData() {
  document.getElementById('updated-time').textContent = 'Refreshing…';
  document.getElementById('dashboard-body').innerHTML = '<div class="loading-screen"><span class="spinner"></span><span>Loading data…</span></div>';
  // Use getLeaderboard which is already in the deployed backend
  callAPI('getLeaderboard', [SESSION_TOKEN], function(err, res) {
    if (err || !res || !res.ok) {
      document.getElementById('dashboard-body').innerHTML =
        '<div class="loading-screen" style="color:var(--red)">❌ ' + (err || (res&&res.msg) || 'Failed') + '</div>';
      return;
    }
    // Build dashboard from leaderboard data
    var total=0, done=0, absent=0;
    res.board.forEach(function(z){ total+=z.total; done+=z.done; absent+=z.absent; });
    var pending = total - done - absent;
    var d = {
      summary: { total:total, done:done, absent:absent, pending:pending, todayCount:'—' },
      board:   res.board,
      wards:   [],
      recent:  [],
      updated: new Date().toLocaleString()
    };
    renderDashboard(d);
  });
}

function renderDashboard(d) {
  document.getElementById('updated-time').textContent = 'Updated: ' + d.updated;
  var s = d.summary;
  var overallPct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
  var medals = ['🥇','🥈','🥉'];

  var lbHtml = d.board.map(function(z, i) {
    var barCol = z.pct >= 75 ? '#22c55e' : z.pct >= 40 ? '#f59e0b' : '#ef4444';
    return '<div class="lb-row">' +
      '<div class="lb-rank">' + (medals[i] || '#' + (i+1)) + '</div>' +
      '<div class="lb-info">' +
        '<div class="lb-name">' + z.name + '</div>' +
        '<div class="lb-block">' + z.block + '</div>' +
        '<div class="lb-bar-wrap"><div class="lb-bar" style="width:' + z.pct + '%;background:' + barCol + '"></div></div>' +
      '</div>' +
      '<div class="lb-nums">' +
        '<div class="lb-pct" style="color:' + barCol + '">' + z.pct + '%</div>' +
        '<div style="color:var(--mut)">✅' + z.done + ' ⏳' + z.pending + ' 🚫' + z.absent + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var actHtml = !d.recent || d.recent.length === 0
    ? '<div style="color:var(--mut);text-align:center;padding:20px">No submissions yet</div>'
    : d.recent.map(function(r) {
        return '<div class="act-row">' +
          '<div class="act-dot"></div>' +
          '<div class="act-info">' +
            '<div class="act-name">' + (r.family || '—') + '</div>' +
            '<div class="act-meta">' + (r.zcrim||'') + ' · ' + (r.ward||'') + ' · ' + (r.time||'') + '</div>' +
          '</div></div>';
      }).join('');

  var wardHtml = d.wards.slice(0, 15).map(function(w) {
    var pct = w.total > 0 ? Math.round(w.done / w.total * 100) : 0;
    return '<div class="ward-row">' +
      '<div class="ward-name">' + w.ward + '</div>' +
      '<div class="ward-bar-wrap"><div class="ward-bar" style="width:' + pct + '%"></div></div>' +
      '<div class="ward-pct">' + pct + '%</div>' +
      '<div style="font-size:11px;color:var(--mut);width:50px;text-align:right">' + w.done + '/' + w.total + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('dashboard-body').innerHTML =
    '<div class="summary-grid">' +
      '<div class="sum-card"><div class="num" style="color:var(--acc)">' + s.total + '</div><div class="lbl">Total Families</div></div>' +
      '<div class="sum-card"><div class="num" style="color:var(--grn)">' + s.done + '</div><div class="lbl">Completed</div></div>' +
      '<div class="sum-card"><div class="num" style="color:var(--org)">' + s.pending + '</div><div class="lbl">Pending</div></div>' +
      '<div class="sum-card"><div class="num" style="color:#a78bfa">' + s.todayCount + '</div><div class="lbl">Today\'s Surveys</div></div>' +
    '</div>' +
    '<div class="overall-bar">' +
      '<h3>Overall Progress — ' + overallPct + '% Complete</h3>' +
      '<div class="prog-track"><div class="prog-fill" style="width:' + overallPct + '%"></div></div>' +
      '<div class="prog-labels"><span>0</span><span>' + s.done + ' of ' + s.total + ' families verified</span><span>' + s.total + '</span></div>' +
    '</div>' +
    '<div class="grid2">' +
      '<div class="panel"><h3>📊 Completion by ZCRIM</h3><div style="position:relative;height:280px"><canvas id="chart-bar"></canvas></div></div>' +
      '<div class="panel"><h3>🥧 Overall Status</h3><div style="position:relative;height:280px"><canvas id="chart-pie"></canvas></div></div>' +
    '</div>' +
    '<div class="grid2">' +
      '<div class="panel"><h3>🏆 ZCRIM Leaderboard</h3>' + lbHtml + '</div>' +
      '<div class="panel"><h3>🕐 Recent Submissions</h3>' + actHtml + '</div>' +
    '</div>' +
    '<div class="panel" style="margin-bottom:24px"><h3>🏘️ Village / Ward Progress (Top 15)</h3>' + wardHtml + '</div>';

  // Render charts after DOM is ready
  setTimeout(function() { renderCharts(d); }, 100);
}

function renderCharts(d) {
  Object.keys(charts).forEach(function(k) { if (charts[k]) { charts[k].destroy(); charts[k] = null; } });

  var barCtx = document.getElementById('chart-bar');
  var pieCtx = document.getElementById('chart-pie');
  if (!barCtx || !pieCtx) return;

  charts.bar = new Chart(barCtx.getContext('2d'), {
    type: 'bar',
    data: {
      labels: d.board.map(function(z) { return z.name; }),
      datasets: [
        { label:'Done',    data: d.board.map(function(z){ return z.done; }),    backgroundColor:'#22c55e' },
        { label:'Absent',  data: d.board.map(function(z){ return z.absent; }),  backgroundColor:'#f59e0b' },
        { label:'Pending', data: d.board.map(function(z){ return z.pending; }), backgroundColor:'#334155' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#94a3b8', font:{size:11} } } },
      scales:{
        x:{ stacked:true, ticks:{ color:'#94a3b8', font:{size:10} }, grid:{ color:'#1e293b' } },
        y:{ stacked:true, ticks:{ color:'#94a3b8' }, grid:{ color:'#334155' } }
      }
    }
  });

  charts.pie = new Chart(pieCtx.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['Completed','Absent','Pending'],
      datasets:[{ data:[d.summary.done, d.summary.absent, d.summary.pending], backgroundColor:['#22c55e','#f59e0b','#334155'], borderWidth:0 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ color:'#94a3b8', font:{size:12}, padding:16 } } }
    }
  });
}

setInterval(function() { if (ADMIN_KEY) loadData(); }, 300000);
</script>
</body>
</html>
