<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ZCRIM Admin Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--bdr:#334155;--acc:#3b82f6;--grn:#22c55e;--org:#f59e0b;--red:#ef4444;--txt:#f1f5f9;--mut:#94a3b8}
body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;font-size:14px;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar h1{font-size:18px;font-weight:800;color:#fff}
.topbar-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.updated{font-size:11px;color:var(--mut)}
.btn{border:none;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:13px}
.btn-blue{background:var(--acc);color:#fff}.btn-blue:hover{background:#2563eb}
.btn-grn{background:#16a34a;color:#fff}
.container{max-width:1300px;margin:0 auto;padding:20px}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
@media(max-width:800px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:18px;text-align:center}
.kpi .num{font-size:34px;font-weight:800;margin-bottom:4px}
.kpi .lbl{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.kpi .sub{font-size:11px;color:var(--mut);margin-top:2px}
.prog-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:20px}
.prog-card h3{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.prog-track{background:#334155;border-radius:8px;height:24px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#3b82f6,#22c55e);transition:width .8s ease;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--mut)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:20px}
.panel h3{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0f172a}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:700;font-size:13px}
.lb-block{font-size:11px;color:var(--mut)}
.lb-last{font-size:10px;color:var(--mut);margin-top:1px}
.lb-bar-wrap{height:4px;background:#334155;border-radius:2px;margin-top:5px}
.lb-bar{height:100%;border-radius:2px;transition:width .6s}
.lb-nums{text-align:right;font-size:12px;flex-shrink:0}
.lb-pct{font-weight:800;font-size:15px}
.ward-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #0f172a}
.ward-row:last-child{border-bottom:none}
.ward-name{flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ward-bar-wrap{width:90px;height:6px;background:#334155;border-radius:3px;flex-shrink:0}
.ward-bar{height:100%;border-radius:3px}
.ward-pct{width:34px;text-align:right;font-size:12px;color:var(--mut);flex-shrink:0}
.ward-nums{font-size:11px;color:var(--mut);width:40px;text-align:right;flex-shrink:0}
.block-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #0f172a}
.block-row:last-child{border-bottom:none}
.block-name{font-size:12px;font-weight:700;width:140px;flex-shrink:0}
.block-bar-wrap{flex:1;height:8px;background:#334155;border-radius:4px}
.block-bar{height:100%;border-radius:4px;transition:width .6s}
.block-stats{font-size:11px;color:var(--mut);width:80px;text-align:right;flex-shrink:0}
.act-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #0f172a}
.act-row:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);margin-top:4px;flex-shrink:0}
.act-info{flex:1}
.act-name{font-weight:600;font-size:13px}
.act-meta{font-size:10px;color:var(--mut)}
.search-box{width:100%;background:#0f172a;border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:13px;outline:none;margin-bottom:12px}
.empty{color:var(--mut);text-align:center;padding:20px;font-size:13px}
.spinner{display:inline-block;width:22px;height:22px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--mut)}
.fb-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #1a0a00}
.fb-row:last-child{border-bottom:none}
.fb-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.fb-info{flex:1}
.fb-family{font-weight:700;font-size:13px;color:var(--txt)}
.fb-meta{font-size:11px;color:var(--mut);margin-top:2px}
.fb-gps{font-size:10px;color:#475569;margin-top:1px}
.fb-badge{background:#78350f;color:#fcd34d;font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;flex-shrink:0;align-self:center}
</style>
</head>
<body>

<div class="topbar">
  <h1>&#x1F3DB; ZCRIM Dashboard &mdash; Mewat/Nuh</h1>
  <div class="topbar-right">
    <select id="block-filter" onchange="applyBlockFilter()" style="background:#0f172a;border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;color:var(--txt);font-size:13px;outline:none">
      <option value="">All Blocks</option>
    </select>
    <span class="updated" id="updated-time">Loading&hellip;</span>
    <button class="btn btn-blue" onclick="loadData()">&#x1F504; Refresh</button>
    <button class="btn btn-grn" onclick="exportCSV()">&#x1F4E5; Export CSV</button>
  </div>
</div>

<div class="container" id="dashboard-body">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span>Loading dashboard&hellip;</span>
  </div>
</div>

<script>
var APPS_SCRIPT_URL = (function(){var _k=42,_d=[66,94,94,90,89,16,5,5,89,73,88,67,90,94,4,77,69,69,77,70,79,4,73,69,71,5,71,75,73,88,69,89,5,89,5,107,97,76,83,73,72,82,101,97,19,19,90,89,127,117,64,79,70,72,72,26,95,80,82,31,7,94,111,72,122,102,18,69,29,82,64,7,69,24,108,28,24,95,80,95,96,69,101,120,109,95,121,95,88,109,104,107,88,115,122,31,71,126,104,93,120,30,117,24,26,26,82,79,123,5,79,82,79,73];var _s="";for(var _i=0;_i<_d.length;_i++)_s+=String.fromCharCode(_d[_i]^_k);return _s;})();
var _AK = (function(){var _k=17,_d=[125,99,38,118,119,32,102,80,125,118,125,103,119,65,69,104,115,93,98,92,73,103,105,73,104,83,67,71,68,72,95,93];var _s="";for(var _i=0;_i<_d.length;_i++)_s+=String.fromCharCode(_d[_i]^_k);return _s;})();
var _AK = (function(){var _k=17,_d=[125,99,38,118,119,32,102,80,125,118,125,103,119,65,69,104,115,93,98,92,73,103,105,73,104,83,67,71,68,72,95,93];var _s="";for(var _i=0;_i<_d.length;_i++)_s+=String.fromCharCode(_d[_i]^_k);return _s;})();
var ADMIN_KEY = '';   // set at runtime via PIN — never hardcoded
var charts   = {};
var dashData = null;

function callAPI(fn, args, cb) {
  // Add timestamp to prevent caching of sensitive responses
  var ts  = Date.now();
  var url = APPS_SCRIPT_URL + '?fn=' + encodeURIComponent(fn)
          + '&args=' + encodeURIComponent(JSON.stringify(args||[]))
          + '&ak=' + encodeURIComponent(_AK)
          + '&_t=' + ts;
  var xhr = new XMLHttpRequest();
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) { cb('HTTP ' + xhr.status); return; }
    try { cb(null, JSON.parse(xhr.responseText)); }
    catch(e) { cb('Parse failed'); }  // never expose raw response
  };
  xhr.onerror   = function(){ cb('Network error'); };
  xhr.ontimeout = function(){ cb('Request timed out'); };
  xhr.timeout   = 30000;
  xhr.open('GET', url, true);
  xhr.setRequestHeader('Cache-Control', 'no-store');
  xhr.send();
}

function showError(msg) {
  // Fallback photo alerts panel
  var alerts = d.fallbackAlerts || [];
  var alertCount = alerts.length;
  var alertRows = alerts.length === 0
    ? '<div class="empty" style="color:#22c55e">&#x2705; No fallback uploads detected — all photos captured via camera</div>'
    : alerts.map(function(a){
        return '<div class="fb-row">'+
          '<div class="fb-icon">&#x26A0;&#xFE0F;</div>'+
          '<div class="fb-info">'+
            '<div class="fb-family">'+a.familyId+' &mdash; <span style="color:#f59e0b">'+a.photoLabel+'</span></div>'+
            '<div class="fb-meta">ZCRIM: <b>'+a.zcrimName+'</b> &middot; '+a.timestamp+'</div>'+
            '<div class="fb-gps">GPS: '+a.gpsLat+', '+a.gpsLng+'</div>'+
          '</div>'+
          '<div class="fb-badge">FALLBACK</div>'+
        '</div>';
      }).join('');

  var fallbackHtml =
    '<div class="panel" style="margin-bottom:24px;border-color:'+(alertCount>0?'#f59e0b':'#334155')+'">'+
      '<h3 style="color:'+(alertCount>0?'#f59e0b':'var(--mut)')+'">'+
        '&#x1F4F7; Photo Fallback Alerts '+
        '<span style="font-size:11px;font-weight:400;padding:2px 10px;border-radius:8px;background:'+(alertCount>0?'#78350f':'#1e293b')+';color:'+(alertCount>0?'#fcd34d':'var(--mut)')+'">'+
          alertCount+(alertCount===1?' upload':' uploads')+
        '</span>'+
      '</h3>'+
      (alertCount>0?'<div style="font-size:11px;color:#f59e0b;margin-bottom:12px;padding:8px 12px;background:#1c1000;border-radius:6px">These families had photos uploaded from gallery instead of live camera. Please verify field visit was genuine.</div>':'')+
      '<div id="fb-list">'+alertRows+'</div>'+
    '</div>';

  document.getElementById('dashboard-body').innerHTML =
    '<div class="loading-screen" style="color:var(--red)"><div style="font-size:36px">&#x274C;</div><b>' + msg + '</b><small style="color:var(--mut)">Check Apps Script URL or deployment</small><button class="btn btn-blue" onclick="loadData()" style="margin-top:8px">Retry</button></div>';
}

function loadData() {
  document.getElementById('updated-time').textContent = 'Refreshing\u2026';
  callAPI('getDashboardData', [ADMIN_KEY], function(err, res) {
    if (err)             { showError(err); return; }
    if (!res || !res.ok) { showError(res ? res.msg : 'No response'); return; }
    dashData = res;
    renderDashboard(res);
  });
}

function renderDashboard(d) {
  document.getElementById('updated-time').textContent = 'Updated: ' + (d.updated || '');
  var s = d.summary || {};
  var total = s.total||0, done = s.done||0, absent = s.absent||0, pending = s.pending||0, today = s.todayCount||0;
  var pct   = total > 0 ? Math.round(done/total*100) : 0;
  var medals = ['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];

  var kpiHtml =
    '<div class="kpi-grid">' +
      kpi(total,   'Total Families', '#3b82f6', '') +
      kpi(done,    'Completed',      '#22c55e', pct+'% done') +
      kpi(pending, 'Pending',        '#f59e0b', '') +
      kpi(absent,  'Absent/Skipped', '#ef4444', '') +
      kpi(today,   "Today's Surveys",'#a78bfa', '') +
    '</div>';

  var progHtml =
    '<div class="prog-card">' +
      '<h3>Overall Survey Progress &mdash; ' + pct + '% Complete</h3>' +
      '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%">'+(pct>5?pct+'%':'')+'</div></div>' +
      '<div class="prog-labels"><span>'+done+' families verified</span><span>'+pending+' remaining</span><span>'+total+' total</span></div>' +
    '</div>';

  var lbHtml = (d.board||[]).map(function(z,i){
    var col = z.pct>=75?'#22c55e':z.pct>=40?'#f59e0b':'#ef4444';
    var last = z.lastActive && z.lastActive!=='Never' ? '\uD83D\uDD50 '+z.lastActive : '\u26A0\uFE0F No activity yet';
    return '<div class="lb-row">'+
      '<div class="lb-rank">'+(medals[i]||'#'+(i+1))+'</div>'+
      '<div class="lb-info">'+
        '<div class="lb-name">'+z.name+'</div>'+
        '<div class="lb-block">'+z.block+'</div>'+
        '<div class="lb-last">'+last+'</div>'+
        '<div class="lb-bar-wrap"><div class="lb-bar" style="width:'+z.pct+'%;background:'+col+'"></div></div>'+
      '</div>'+
      '<div class="lb-nums">'+
        '<div class="lb-pct" style="color:'+col+'">'+z.pct+'%</div>'+
        '<div style="color:#22c55e">\u2705 '+z.done+'</div>'+
        '<div style="color:#f59e0b">\u23F3 '+z.pending+'</div>'+
        '<div style="color:#ef4444">\uD83D\uDEAB '+z.absent+'</div>'+
      '</div>'+
    '</div>';
  }).join('') || '<div class="empty">No data</div>';

  var actHtml = (d.recent||[]).length===0
    ? '<div class="empty">No submissions yet</div>'
    : (d.recent||[]).map(function(r){
        return '<div class="act-row"><div class="act-dot"></div><div class="act-info"><div class="act-name">'+r.family+'</div><div class="act-meta">'+r.zcrim+' &middot; '+r.ward+' &middot; '+r.time+'</div></div></div>';
      }).join('');

  var blockHtml = (d.blocks||[]).map(function(b){
    var p = b.total>0?Math.round(b.done/b.total*100):0;
    var col = p>=75?'#22c55e':p>=40?'#f59e0b':'#ef4444';
    return '<div class="block-row"><div class="block-name">'+b.block+'</div><div class="block-bar-wrap"><div class="block-bar" style="width:'+p+'%;background:'+col+'"></div></div><div class="block-stats">'+b.done+'/'+b.total+' ('+p+'%)</div></div>';
  }).join('') || '<div class="empty">No data</div>';

  var wardRows = (d.wards||[]).map(function(w){
    var p = w.total>0?Math.round(w.done/w.total*100):0;
    var col = p===100?'#22c55e':p>=50?'#3b82f6':'#f59e0b';
    return '<div class="ward-row" data-ward="'+w.ward.toLowerCase()+'">'+
      '<div class="ward-name">'+w.ward+'<div style="font-size:10px;color:var(--mut)">'+(w.block||'')+'</div></div>'+
      '<div class="ward-bar-wrap"><div class="ward-bar" style="width:'+p+'%;background:'+col+'"></div></div>'+
      '<div class="ward-pct">'+p+'%</div>'+
      '<div class="ward-nums">'+w.done+'/'+w.total+'</div>'+
      '<div style="font-size:10px;width:32px;text-align:right;color:#ef4444">\uD83D\uDEAB'+(w.absent||0)+'</div>'+
    '</div>';
  }).join('') || '<div class="empty">No village data</div>';

  // Fallback photo alerts panel
  var alerts = d.fallbackAlerts || [];
  var alertCount = alerts.length;
  var alertRows = alerts.length === 0
    ? '<div class="empty" style="color:#22c55e">&#x2705; No fallback uploads detected — all photos captured via camera</div>'
    : alerts.map(function(a){
        return '<div class="fb-row">'+
          '<div class="fb-icon">&#x26A0;&#xFE0F;</div>'+
          '<div class="fb-info">'+
            '<div class="fb-family">'+a.familyId+' &mdash; <span style="color:#f59e0b">'+a.photoLabel+'</span></div>'+
            '<div class="fb-meta">ZCRIM: <b>'+a.zcrimName+'</b> &middot; '+a.timestamp+'</div>'+
            '<div class="fb-gps">GPS: '+a.gpsLat+', '+a.gpsLng+'</div>'+
          '</div>'+
          '<div class="fb-badge">FALLBACK</div>'+
        '</div>';
      }).join('');

  var fallbackHtml =
    '<div class="panel" style="margin-bottom:24px;border-color:'+(alertCount>0?'#f59e0b':'#334155')+'">'+
      '<h3 style="color:'+(alertCount>0?'#f59e0b':'var(--mut)')+'">'+
        '&#x1F4F7; Photo Fallback Alerts '+
        '<span style="font-size:11px;font-weight:400;padding:2px 10px;border-radius:8px;background:'+(alertCount>0?'#78350f':'#1e293b')+';color:'+(alertCount>0?'#fcd34d':'var(--mut)')+'">'+
          alertCount+(alertCount===1?' upload':' uploads')+
        '</span>'+
      '</h3>'+
      (alertCount>0?'<div style="font-size:11px;color:#f59e0b;margin-bottom:12px;padding:8px 12px;background:#1c1000;border-radius:6px">These families had photos uploaded from gallery instead of live camera. Please verify field visit was genuine.</div>':'')+
      '<div id="fb-list">'+alertRows+'</div>'+
    '</div>';

  document.getElementById('dashboard-body').innerHTML =
    kpiHtml + progHtml +
    '<div class="grid2">'+
      '<div class="panel"><h3>&#x1F4CA; Completion by ZCRIM</h3><div style="position:relative;height:260px"><canvas id="chart-bar"></canvas></div></div>'+
      '<div class="panel"><h3>&#x1F4C8; Daily Trend <span style="font-size:10px;font-weight:400">Last 14 days</span></h3><div style="position:relative;height:260px"><canvas id="chart-trend"></canvas></div></div>'+
    '</div>'+
    '<div class="grid3">'+
      '<div class="panel"><h3>&#x1F3C6; ZCRIM Leaderboard</h3>'+lbHtml+'</div>'+
      '<div class="panel"><h3>&#x1F550; Recent Submissions</h3>'+actHtml+'</div>'+
      '<div class="panel"><h3>&#x1F5C2; Block Summary</h3>'+blockHtml+'</div>'+
    '</div>'+
    '<div class="panel" style="margin-bottom:20px">'+
      '<h3>&#x1F3D8; Village / Ward Breakdown <span style="font-weight:400;font-size:11px">'+(d.wards||[]).length+' villages</span></h3>'+
      '<input class="search-box" id="ward-search" placeholder="Search village..." oninput="filterWards(this.value)"/>'+
      '<div id="ward-list">'+wardRows+'</div>'+
    '</div>'+
    fallbackHtml;

  // Populate block filter dropdown from real data
  var sel = document.getElementById('block-filter');
  if (sel && d.blockNames && d.blockNames.length) {
    var current = sel.value;
    sel.innerHTML = '<option value="">All Blocks</option>';
    d.blockNames.forEach(function(b){
      var opt = document.createElement('option');
      opt.value = b; opt.textContent = b;
      if (b === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  setTimeout(function(){ renderCharts(d); }, 100);
}

function kpi(num, label, color, sub) {
  return '<div class="kpi"><div class="num" style="color:'+color+'">'+num+'</div><div class="lbl">'+label+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
}

function filterWards(q) {
  document.querySelectorAll('#ward-list .ward-row').forEach(function(r){
    r.style.display = r.getAttribute('data-ward').indexOf(q.toLowerCase())>-1 ? '' : 'none';
  });
}

function renderCharts(d) {
  Object.keys(charts).forEach(function(k){ if(charts[k]){ charts[k].destroy(); charts[k]=null; } });
  var barEl=document.getElementById('chart-bar'), trendEl=document.getElementById('chart-trend');
  if(!barEl||!trendEl) return;
  charts.bar = new Chart(barEl.getContext('2d'),{
    type:'bar',
    data:{
      labels:(d.board||[]).map(function(z){ return z.name.split(' ')[0]; }),
      datasets:[
        {label:'Done',    data:(d.board||[]).map(function(z){return z.done;}),    backgroundColor:'#22c55e'},
        {label:'Absent',  data:(d.board||[]).map(function(z){return z.absent;}),  backgroundColor:'#f59e0b'},
        {label:'Pending', data:(d.board||[]).map(function(z){return z.pending;}), backgroundColor:'#334155'}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{
        x:{stacked:true,ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#1e293b'}},
        y:{stacked:true,ticks:{color:'#94a3b8'},grid:{color:'#334155'}}
      }
    }
  });
  charts.trend = new Chart(trendEl.getContext('2d'),{
    type:'line',
    data:{
      labels:(d.trend||[]).map(function(t){return t.date;}),
      datasets:[{label:'Surveys',data:(d.trend||[]).map(function(t){return t.count;}),
        borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.15)',fill:true,tension:0.4,pointBackgroundColor:'#3b82f6',pointRadius:4}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8'},grid:{color:'#334155'},beginAtZero:true}
      }
    }
  });
}

function applyBlockFilter() {
  var block = document.getElementById('block-filter').value.toUpperCase();
  if (!dashData) return;
  var f = JSON.parse(JSON.stringify(dashData));
  if (block) {
    f.board  = (f.board||[]).filter(function(z){ return z.block.toUpperCase()===block; });
    f.wards  = (f.wards||[]).filter(function(w){ return (w.block||'').toUpperCase()===block; });
    f.blocks = (f.blocks||[]).filter(function(b){ return b.block.toUpperCase()===block; });
  }
  renderDashboard(f);
}

function exportCSV() {
  if (!dashData||!dashData.board) { alert('Load dashboard first'); return; }
  var rows = [['Name','Block','Total','Done','Absent','Pending','%','Last Active']];
  dashData.board.forEach(function(z){ rows.push([z.name,z.block,z.total,z.done,z.absent,z.pending,z.pct+'%',z.lastActive||'']); });
  rows.push([],['Block','','Total','Done','Absent','Pending','%']);
  (dashData.blocks||[]).forEach(function(b){
    var p=b.total>0?Math.round(b.done/b.total*100):0;
    rows.push([b.block,'',b.total,b.done,b.absent||0,b.total-b.done-(b.absent||0),p+'%']);
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='ZCRIM_Progress_'+new Date().toLocaleDateString().replace(/\//g,'-')+'.csv';
  a.click();
}

window.addEventListener('load', function(){ showPinPrompt(); });

function showPinPrompt() {
  var body = document.getElementById('dashboard-body');
  body.innerHTML =
    '<div style="min-height:80vh;display:flex;align-items:center;justify-content:center">' +
    '<div style="background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:32px;width:100%;max-width:340px;text-align:center">' +
      '<div style="font-size:48px;margin-bottom:12px">&#x1F511;</div>' +
      '<h2 style="font-size:20px;font-weight:800;margin-bottom:6px">Admin Access</h2>' +
      '<p style="color:var(--mut);font-size:13px;margin-bottom:20px">ZCRIM Dashboard &mdash; Mewat/Nuh</p>' +
      '<input id="admin-pin" type="password" placeholder="Enter admin key" ' +
        'style="width:100%;background:#0f172a;border:1px solid var(--bdr);border-radius:8px;padding:12px;' +
        'color:var(--txt);font-size:15px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px" ' +
        'onkeydown="if(event.key===\"Enter\") verifyPin()"/>' +
      '<button onclick="verifyPin()" ' +
        'style="width:100%;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">' +
        'Access Dashboard &rarr;' +
      '</button>' +
      '<div id="pin-err" style="color:var(--red);font-size:12px;margin-top:10px"></div>' +
    '</div></div>';
  setTimeout(function(){ var el=document.getElementById('admin-pin'); if(el) el.focus(); }, 100);
}

function verifyPin() {
  var pin = (document.getElementById('admin-pin').value || '').trim();
  if (!pin) { document.getElementById('pin-err').textContent = 'Enter admin key'; return; }
  // Send to backend to verify — key never stored in JS source
  ADMIN_KEY = pin;
  document.getElementById('dashboard-body').innerHTML =
    '<div class="loading-screen"><div class="spinner"></div><span>Verifying&hellip;</span></div>';
  callAPI('getDashboardData', [ADMIN_KEY], function(err, res) {
    if (err || !res || !res.ok) {
      ADMIN_KEY = ''; // clear on failure
      showPinPrompt();
      setTimeout(function(){
        var e = document.getElementById('pin-err');
        if (e) e.textContent = 'Invalid admin key';
      }, 100);
      return;
    }
    dashData = res;
    renderDashboard(res);
  });
}
setInterval(function(){ loadData(); }, 60000);
</script>
